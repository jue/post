# Javascript Node CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-javascript/ for more details
#
version: 2
jobs:
  build:
    docker:
      # specify the version you desire here
      - image: node:latest

    working_directory: ~/acyort

    branches:
      only:
        - master

    steps:
      - checkout
      # - run: rm -rf docs
      - run: npm install acyort -g
      - run: npm i
      - run: acyort build  
      - run: git checkout .  
      - run: git checkout gh-pages # 静态文件存放分支
      - run: git reset --hard origin/gh-pages
      - run: git add .
      - run: git config user.name "xiangjianfeng" # 你的 GitHub 用户名
      - run: git config user.email "i@xiangjianfeng.com" # 你的 GitHub 邮箱
      - run: git commit -m "Updated by circleci - `date`"
      # 下面填写你的 usename 和 repository  
      - run: git push -q https://${gh_token}@github.com/xiangjianfeng/post.git gh-pages:gh-pages 